    <script>
        // Authentication Check - Disabled
        function checkAuth() {
            return true; // Always allow access
        }

        // Authentication check disabled - always allow access

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const size = Math.random() * 4 + 2;
                const left = Math.random() * 100;
                const animationDelay = Math.random() * 6;

                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = left + '%';
                particle.style.animationDelay = animationDelay + 's';
                particle.style.animationDuration = (Math.random() * 3 + 4) + 's';

                particlesContainer.appendChild(particle);
            }
        }

        // Initialize particles
        createParticles();

        async function verifyUrl() {
            const urlInput = document.getElementById('url');
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            const btn = document.getElementById('verifyBtn');
            const consoleBody = document.getElementById('console');
            const url = urlInput.value.trim();
            if (!url) { showResult('VUI LÒNG NHẬP URL HỢP LỆ', 'error'); return; }
            btn.disabled = true; loadingDiv.classList.add('show'); resultDiv.innerHTML = ''; consoleBody.innerHTML = '';

            // Generate job_id for debugging
            const job_id = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            // Show detailed console steps
            logToConsole('1. Submit form');
            logToConsole(`   URL: ${url}`);
            logToConsole(`   Job ID: ${job_id}`);
            setTimeout(() => logToConsole('2. Đang xác minh sinh viên'), 500);
            setTimeout(() => logToConsole('3. Đang xác thực toàn bộ'), 1000);

            try {
                logToConsole('4. Gửi request đến /start-verification...');
                const res = await fetch('/start-verification', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url, job_id }) });
                logToConsole(`5. Response status: ${res.status}`);

                const data = await res.json();
                logToConsole(`6. Response data: ${JSON.stringify(data, null, 2)}`);

                // Show debug info if available
                if (data.debug_info && data.debug_info.steps) {
                    logToConsole('   Debug steps:');
                    data.debug_info.steps.forEach((step, index) => {
                        logToConsole(`     ${index + 1}. ${step.t}: ${step.msg}`);
                    });
                }

                const ok = !!data.success;
                if (data.started && ok) {
                    logToConsole('7. ✅ Verification thành công!');
                    showResult('Quang đã cõng bạn thành công', 'success');
                    if (data.card_filename) {
                        showStudentCard(data.student_info || {}, data.card_filename, data.upload_result || {});
                    }
                } else {
                    logToConsole(`7. ❌ Verification thất bại: ${data.error || 'Unknown error'}`);
                    showResult('Quang cõng bạn thất bại rùi T_T thử lại sau nhen', 'error');
                }
            } catch (e) {
                logToConsole(`7. ❌ Exception: ${e.message}`);
                logToConsole(`   Stack: ${e.stack}`);
                showResult('Quang cõng bạn thất bại rùi T_T thử lại sau nhen', 'error');
            }
            finally { btn.disabled = false; loadingDiv.classList.remove('show'); }
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="result ${type}"><div>${message}</div><div class="status">Thời gian: ${new Date().toLocaleString('vi-VN')}</div></div>`;
        }

        function logToConsole(message, type = 'info') {
            const consoleBody = document.getElementById('console');
            if (!consoleBody) {
                console.log(`[${new Date().toLocaleTimeString()}] ${message}`);
                return;
            }
            const logEntry = document.createElement('div');
            logEntry.className = `console-log-entry ${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleBody.appendChild(logEntry);
            consoleBody.scrollTop = consoleBody.scrollHeight;
        }

        function showStudentCard(info, cardFilename, uploadResult) {
            if (!cardFilename) return;
            const container = document.getElementById('result');
            const imgUrl = `/student-card/${cardFilename}`;
            container.innerHTML = `
                <div class="result success">
                    <div style="display:flex;flex-direction:column;gap:10px;align-items:center;">
                        <div>Student card generated</div>
                        <img src="${imgUrl}" alt="student card" style="max-width:100%;border-radius:12px;border:2px solid rgba(255,255,255,0.2)"/>
                        <div class="status">${new Date().toLocaleString('vi-VN')}</div>
                    </div>
                </div>`;
        }

        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function () {
            const verifyBtn = document.getElementById('verifyBtn');
            const urlInput = document.getElementById('url');

            if (verifyBtn) {
                verifyBtn.addEventListener('click', verifyUrl);
            }
            if (urlInput) {
                urlInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        verifyUrl();
                    }
                });
            }


        });



        // Logout function
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                // Clear session data
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('username');
                localStorage.removeItem('loginTime');

                // Redirect to login page
                window.location.href = 'index.html';
            }
        }
    </script>
